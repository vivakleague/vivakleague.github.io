<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울 이랜드 FC · 경기 전 홍보 리포트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap');

:root {
  --navy: #0a1628;
  --navy2: #132040;
  --navy3: #1c2f58;
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --gold-dim: #7a6330;
  --white: #f0f4ff;
  --gray: #8a9ab8;
  --gray2: #3a4a6a;
  --green: #2ecc71;
  --red: #e74c3c;
  --draw: #5e9bdc;
  --card-bg: #111e38;
  --border: #1e3060;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--navy);
  color: var(--white);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #06101f 0%, #132040 60%, #0e1a35 100%);
  border-bottom: 2px solid var(--gold);
  padding: 28px 32px 20px;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 220px; height: 220px;
  border: 2px solid var(--gold-dim);
  border-radius: 50%;
  opacity: 0.15;
}
.header-top { display:flex; align-items:center; gap:16px; margin-bottom:12px; }
.club-badge {
  width:44px; height:44px;
  background: var(--gold);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue',sans-serif;
  font-size:1rem; color:var(--navy);
  letter-spacing:1px; flex-shrink:0;
}
.header-title { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:3px; color:var(--gold2); }
.header-sub { font-size:0.72rem; color:var(--gray); letter-spacing:1px; }

/* INPUT FORM */
.form-section {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
}
.form-grid { display:flex; gap:12px; align-items:end; flex-wrap:wrap; }
.form-group label {
  display:block; font-size:0.68rem; color:var(--gray);
  letter-spacing:1px; margin-bottom:6px; text-transform:uppercase;
}
.form-group input, .form-group select {
  width:100%; background:var(--navy3); border:1px solid var(--border);
  color:var(--white); padding:9px 12px; border-radius:6px;
  font-size:0.85rem; font-family:'Noto Sans KR',sans-serif;
  outline:none; transition:border-color .2s;
}
.form-group input:focus, .form-group select:focus { border-color:var(--gold); }
.form-group select option { background:var(--navy2); }
.btn-run {
  background: var(--gold);
  color: var(--navy);
  border: none; padding: 10px 24px;
  border-radius: 6px; font-size:0.85rem; font-weight:700;
  cursor:pointer; white-space:nowrap;
  font-family:'Noto Sans KR',sans-serif;
  transition: background .2s, transform .1s;
}
.btn-run:hover { background:var(--gold2); transform:translateY(-1px); }
.btn-run:active { transform:translateY(0); }

/* MAIN */
.main { padding: 24px 32px; max-width: 1200px; margin: 0 auto; }

/* MATCH TITLE BANNER */
.match-banner {
  background: linear-gradient(135deg, var(--navy3) 0%, var(--navy2) 100%);
  border: 1px solid var(--border);
  border-left: 4px solid var(--gold);
  border-radius: 10px;
  padding: 20px 24px;
  margin-bottom: 24px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.match-vs { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:4px; color:var(--gold2); }
.match-meta { font-size:0.78rem; color:var(--gray); display:flex; gap:16px; flex-wrap:wrap; }
.match-meta span { display:flex; align-items:center; gap:4px; }

/* SECTION LABELS */
.section-label {
  font-size:0.68rem; letter-spacing:2px; text-transform:uppercase;
  color:var(--gold); font-weight:700; margin-bottom:12px;
  padding-bottom:6px; border-bottom:1px solid var(--gold-dim);
}

/* GRID LAYOUTS */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:24px; }
.grid-full { margin-bottom:24px; }

/* CARDS */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
}
.card-title {
  font-size:0.72rem; color:var(--gray); letter-spacing:1px;
  text-transform:uppercase; margin-bottom:14px; font-weight:500;
}

/* RECORD BADGE */
.record-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
.badge {
  padding: 4px 10px; border-radius:20px; font-size:0.75rem; font-weight:700;
  letter-spacing:0.5px;
}
.badge-w { background:#1a3a28; color:var(--green); border:1px solid #2ecc7166; }
.badge-d { background:#1a2a40; color:var(--draw); border:1px solid #5e9bdc66; }
.badge-l { background:#3a1a1a; color:var(--red); border:1px solid #e74c3c66; }
.badge-gold { background:#2a2010; color:var(--gold2); border:1px solid var(--gold-dim); }
.badge-neutral { background:var(--navy3); color:var(--gray); border:1px solid var(--border); }

/* BIG NUMBER */
.big-num { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; color:var(--gold2); line-height:1; }
.big-num-sm { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:var(--white); line-height:1; }
.big-label { font-size:0.7rem; color:var(--gray); margin-top:4px; }

/* STAT ROW */
.stat-row { display:flex; gap:20px; margin-bottom:10px; }
.stat-item { text-align:center; }
.stat-item .num { font-size:1.4rem; font-weight:700; color:var(--white); }
.stat-item .num.green { color:var(--green); }
.stat-item .num.blue { color:var(--draw); }
.stat-item .num.red { color:var(--red); }
.stat-item .lbl { font-size:0.65rem; color:var(--gray); }

/* HIGHLIGHT BOX */
.highlight {
  background: linear-gradient(135deg, #1a2a10 0%, #152010 100%);
  border: 1px solid #2ecc7133;
  border-radius: 8px; padding: 12px 16px; margin-bottom:10px;
}
.highlight.gold {
  background: linear-gradient(135deg, #2a2010 0%, #1e1808 100%);
  border-color: var(--gold-dim);
}
.highlight.blue {
  background: linear-gradient(135deg, #101a2a 0%, #0e1820 100%);
  border-color: #5e9bdc44;
}
.highlight-label { font-size:0.65rem; color:var(--gray); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
.highlight-val { font-size:0.9rem; color:var(--white); font-weight:500; }
.highlight-val strong { color:var(--gold2); }
.highlight-val.green { color:var(--green); }

/* RECENT GAMES */
.game-list { display:flex; flex-direction:column; gap:6px; }
.game-row {
  display:flex; align-items:center; gap:10px;
  padding:7px 10px; border-radius:6px;
  background:var(--navy3); font-size:0.8rem;
}
.game-row .g-date { color:var(--gray); width:36px; flex-shrink:0; }
.game-row .g-opp { flex:1; }
.game-row .g-score { font-weight:700; width:40px; text-align:right; }
.game-row .g-res { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.65rem; font-weight:700; flex-shrink:0; }
.g-res.W { background:#1a3a28; color:var(--green); }
.g-res.D { background:#1a2a40; color:var(--draw); }
.g-res.L { background:#3a1a1a; color:var(--red); }

/* SEASON COMPARE */
.season-table { width:100%; border-collapse:collapse; font-size:0.78rem; }
.season-table th { color:var(--gray); font-weight:400; padding:6px 10px; text-align:center; border-bottom:1px solid var(--border); font-size:0.68rem; letter-spacing:1px; }
.season-table td { padding:7px 10px; text-align:center; border-bottom:1px solid #1a2a45; }
.season-table tr:last-child td { border-bottom:none; }
.season-table tr.current-season td { background:#1a2a10; color:var(--gold2); font-weight:700; }
.season-table tr:hover td { background:#1a2a40; }
.pts-bar-wrap { display:inline-flex; align-items:center; gap:6px; }
.pts-bar { height:4px; border-radius:2px; background:var(--gold); display:inline-block; }

/* STREAK VISUAL */
.streak-timeline { display:flex; flex-wrap:wrap; gap:4px; }
.streak-dot {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:0.65rem; font-weight:700;
}
.streak-dot.W { background:#1a3a28; color:var(--green); border:1px solid #2ecc7166; }
.streak-dot.D { background:#1a2a40; color:var(--draw); border:1px solid #5e9bdc66; }
.streak-dot.L { background:#3a1a1a; color:var(--red); border:1px solid #e74c3c66; }

/* REPORT LIST */
.report-list { list-style:none; display:flex; flex-direction:column; gap:8px; }
.report-item {
  background:var(--navy3);
  border-left:3px solid var(--gold);
  border-radius:0 6px 6px 0;
  padding:10px 14px;
  font-size:0.82rem; line-height:1.5;
}
.report-item strong { color:var(--gold2); }
.report-item.secondary { border-left-color:var(--gray2); opacity:0.8; }

/* EMPTY / ERROR */
.empty { color:var(--gray); font-size:0.82rem; padding:12px 0; }



/* TABS */
.tab-bar { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:24px; }
.tab-btn {
  padding:10px 22px; font-size:.8rem; font-family:'Noto Sans KR',sans-serif;
  background:none; border:none; color:var(--gray); cursor:pointer;
  border-bottom:2px solid transparent; margin-bottom:-2px;
  transition:all .2s; letter-spacing:.5px;
}
.tab-btn:hover { color:var(--white); }
.tab-btn.active { color:var(--gold2); border-bottom-color:var(--gold); font-weight:700; }
.tab-pane { display:none; }
.tab-pane.active { display:block; }
/* RESPONSIVE */
@media (max-width:700px) {
  .form-grid { grid-template-columns:1fr 1fr; }
  .grid-2, .grid-3 { grid-template-columns:1fr; }
  

.spinner { display:none; }
.loading .spinner { display:block; }

</style>
</head>

function populateSchedule() {
  const sel = document.getElementById('inp-match');
  if(!sel) return;
  const today = new Date();
  today.setHours(0,0,0,0);
  sel.innerHTML = '<option value="">— 경기 선택 —</option>';
  let firstUpcoming = -1;
  SCHEDULE.forEach((s, i) => {
    const d = parseDate(s[2]);
    const wdKR = ['일','월','화','수','목','금','토'][d.getDay()];
    const venue = s[3]==='H' ? '홈' : '원정';
    const stadium = s[5] || '';
    const isPast = d < today;
    const roundStr = s[0] + 'R';
    const label = `${roundStr} · ${s[2]} (${wdKR}) · ${venue} vs ${s[4]} · ${stadium}`;
    sel.innerHTML += `<option value="${i}" ${isPast?'style="color:#4a5a7a"':''}>${isPast?'[완료] ':''}${label}</option>`;
    if(!isPast && firstUpcoming===-1) firstUpcoming = i;
  });
  if(firstUpcoming !== -1) {
    sel.value = firstUpcoming;
    onMatchSelect();
  }
}

function onMatchSelect() {
  const sel = document.getElementById('inp-match');
  const idx = sel.value;
  if(idx === '') {
    document.getElementById('match-info-preview').style.display='none';
    document.getElementById('inp-opponent').value = '';
    return;
  }
  const s = SCHEDULE[+idx];
  const d = parseDate(s[2]);
  const wdKR = ['일','월','화','수','목','금','토'][d.getDay()];
  const venue = s[3]==='H' ? '홈' : '원정';
  const stadium = s[5] || '';
  document.getElementById('inp-opponent').value = s[4];
  const preview = document.getElementById('match-info-preview');
  preview.style.display = 'block';
  preview.innerHTML = `<span style="color:var(--gold2);font-weight:700">${s[0]}R · vs ${s[4]}</span> &nbsp;|&nbsp; ${s[2]} (${wdKR}요일) &nbsp;|&nbsp; ${venue} &nbsp;|&nbsp; <span style="color:var(--gray)">${stadium}</span>`;
}

// ─── 분석 함수들 ──────────────────────────────────────────────
function parseDate(s) { const [y,m,d]=s.split('-'); return new Date(y,m-1,d); }
function fmtDate(d) { return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }
function daysBetween(a, b) { return Math.round((b-a)/(1000*60*60*24)); }

function buildMatches() {
  return RAW_MATCHES.map(r => {
    const date = parseDate(r[2]);
    return {
      season: r[0], match_no: r[1],
      date, dateKey: r[2], venue: r[3], opponent: r[4],
      result: r[5], gf: r[6], ga: r[7],
      weekday: date.getDay(),
      manager: getManager(r[2]),
      isLeague: r[1] !== 0  // K리그 정규(>0) + PO(-1) = true, FA컵(0) = false
    };
  }).sort((a,b)=>a.date-b.date);
}

function managerRecord(matches) {
  const mgr = {};
  const mgrLeague = {}; // K리그+PO
  const mgrAll = {};
  for (const m of matches) {
    // 전체 (FA컵+PO 포함)
    if (!mgrAll[m.manager]) mgrAll[m.manager] = {w:0,d:0,l:0,games:0,gf:0,ga:0};
    mgrAll[m.manager].games++;
    mgrAll[m.manager].gf += m.gf;
    mgrAll[m.manager].ga += m.ga;
    if (m.result==='W') mgrAll[m.manager].w++;
    else if (m.result==='D') mgrAll[m.manager].d++;
    else mgrAll[m.manager].l++;
    // K리그+PO (isLeague)
    if (m.isLeague) {
      if (!mgrLeague[m.manager]) mgrLeague[m.manager] = {w:0,d:0,l:0,games:0,gf:0,ga:0,blank:0};
      mgrLeague[m.manager].games++;
      mgrLeague[m.manager].gf += m.gf;
      mgrLeague[m.manager].ga += m.ga;
      if (m.gf === 0) mgrLeague[m.manager].blank++;
      if (m.result==='W') mgrLeague[m.manager].w++;
      else if (m.result==='D') mgrLeague[m.manager].d++;
      else mgrLeague[m.manager].l++;
    }
    // 정규리그만 (K리그, PO 제외)
    if (m.match_no > 0) {
      if (!mgr[m.manager]) mgr[m.manager] = {w:0,d:0,l:0,games:0,gf:0,ga:0};
      mgr[m.manager].games++;
      mgr[m.manager].gf += m.gf;
      mgr[m.manager].ga += m.ga;
      if(m.gf === 0) mgr[m.manager].blank = (mgr[m.manager].blank||0)+1;
      if (m.result==='W') mgr[m.manager].w++;
      else if (m.result==='D') mgr[m.manager].d++;
      else mgr[m.manager].l++;
    }
  }
  // 현재 감독 체제 연속 기록
  const current = getManager(matches[matches.length-1].date.toISOString().slice(0,10));
  const curMatches = [];
  for (let i=matches.length-1; i>=0; i--) {
    if (matches[i].manager === current) curMatches.unshift(matches[i]);
    else break;
  }
  return { byManager: mgr, byManagerLeague: mgrLeague, byManagerAll: mgrAll, current, curRecord: mgrAll[current]||{w:0,d:0,l:0,games:0}, curMatches };
}



function renderBigWins(bigW) {
  return (bigW||[]).map(m => {
    const dateKey = m.dateKey;
    const det = MATCH_DETAILS[dateKey];
    const sd = SCORER_DATA[dateKey];
    const compInfo = det ? det.comp + ' ' + det.round + 'R' : '';
    const scorers = (sd && sd.s.length) ? sd.s : (det && det.scorers.length ? det.scorers : []);
    const mom = (sd && sd.m) ? sd.m : (det && det.mom ? det.mom : null);
    const scorerStr = scorers.length ? scorers.join(', ') : '기록 없음';
    const momStr = mom ? ' · MOM: ' + mom : '';
    return '<div class="game-row" style="flex-direction:column;align-items:flex-start;gap:4px;padding:10px 12px;">'
      + '<div style="display:flex;align-items:center;gap:10px;width:100%">'
      + '<span class="g-date" style="width:80px;flex-shrink:0">' + fmtDate(m.date) + '</span>'
      + '<span class="g-opp">vs ' + m.opponent + ' <span style="font-size:.7rem;color:' + (m.venue==='H'?'#4a9eff':'var(--gray)') + '">(' + (m.venue==='H'?'홈':'원정') + ')</span></span>'
      + '<span style="flex:1;font-size:.7rem;color:var(--gray)">' + compInfo + '</span>'
      + '<span class="g-score" style="color:var(--gold2);font-size:1rem">' + m.gf + '-' + m.ga + '</span>'
      + '<span class="badge badge-w">+' + (m.gf-m.ga) + '</span>'
      + '</div>'
      + '<div style="font-size:.72rem;color:var(--gray);padding-left:90px">⚽ ' + scorerStr + momStr + '</div>'
      + '</div>';
  }).join('');
}

function vsRecord(matches, opp, nextVenue, nextDate) {
  const vs = matches.filter(m=>m.opponent===opp && m.match_no > 0);  // K리그 정규리그만
  if(!vs.length) return {found:false};
  const w=vs.filter(m=>m.result==='W'), d=vs.filter(m=>m.result==='D'), l=vs.filter(m=>m.result==='L');
  const vsH=vs.filter(m=>m.venue==='H'), vsA=vs.filter(m=>m.venue==='A');
  const wH=vsH.filter(m=>m.result==='W'), wA=vsA.filter(m=>m.result==='W');
  const lastWin=w.length?w[w.length-1]:null;
  const lastHWin=wH.length?wH[wH.length-1]:null;
  const lastAWin=wA.length?wA[wA.length-1]:null;

  // 현재 연속 무패 vs 해당팀
  let curUnbeaten=0;
  for(let i=vs.length-1;i>=0;i--){ if(vs[i].result!=='L') curUnbeaten++; else break; }
  let curHUnbeaten=0;
  for(let i=vsH.length-1;i>=0;i--){ if(vsH[i].result!=='L') curHUnbeaten++; else break; }

  const totalGoals=vs.reduce((s,m)=>s+m.gf+m.ga,0);

  return {
    found:true, opp, total:vs.length,
    w:w.length, d:d.length, l:l.length,
    gf:vs.reduce((s,m)=>s+m.gf,0), ga:vs.reduce((s,m)=>s+m.ga,0),
    homeW:wH.length, homeD:vsH.filter(m=>m.result==='D').length, homeL:vsH.filter(m=>m.result==='L').length,
    homeGF:vsH.reduce((s,m)=>s+m.gf,0), homeGA:vsH.reduce((s,m)=>s+m.ga,0),
    awayW:wA.length, awayD:vsA.filter(m=>m.result==='D').length, awayL:vsA.filter(m=>m.result==='L').length,
    totalGoals, avgGoals:(totalGoals/vs.length).toFixed(1),
    lastWin: lastWin?{date:fmtDate(lastWin.date),score:`${lastWin.gf}-${lastWin.ga}`,venue:lastWin.venue==='H'?'홈':`@${opp}`}:null,
    lastHWin: lastHWin?{date:fmtDate(lastHWin.date),score:`${lastHWin.gf}-${lastHWin.ga}`}:null,
    lastAWin: lastAWin?{date:fmtDate(lastAWin.date),score:`${lastAWin.gf}-${lastAWin.ga}`}:null,
    curUnbeaten, curHUnbeaten,
    firstHomeWin: nextVenue==='H' && wH.length===0,
    daysSinceLastWin: lastWin&&nextDate? daysBetween(lastWin.date, nextDate): null,
    seasonStats: (function(){
      const bySeason={};
      vs.forEach(function(m){ if(!bySeason[m.season]) bySeason[m.season]=[]; bySeason[m.season].push(m); });
      return Object.entries(bySeason).sort(function(a,b){return +b[0]-+a[0];}).map(function(entry){
        var s=entry[0], ms=entry[1];
        return {season:+s, w:ms.filter(function(m){return m.result==='W';}).length, d:ms.filter(function(m){return m.result==='D';}).length, l:ms.filter(function(m){return m.result==='L';}).length, gf:ms.reduce(function(sum,m){return sum+m.gf;},0), ga:ms.reduce(function(sum,m){return sum+m.ga;},0), games:ms.length};
      });
    })(),
  };
}


function winStreaks(matches, nextDate) {
  const streaks=[], cur=[];
  for(const m of matches){
    if(m.result==='W') cur.push(m);
    else { if(cur.length) streaks.push([...cur]); cur.length=0; }
  }
  if(cur.length) streaks.push([...cur]);

  let curStreak=0;
  for(let i=matches.length-1;i>=0;i--){ if(matches[i].result==='W') curStreak++; else break; }

  const maxStreak=streaks.reduce((mx,s)=>Math.max(mx,s.length),0);
  const fivePlus=streaks.filter(s=>s.length>=5).sort((a,b)=>a[0].date-b[0].date);

  let daysSinceLast5=null;
  if(curStreak>=4 && fivePlus.length && nextDate){
    const last5=fivePlus[fivePlus.length-1];
    daysSinceLast5=daysBetween(last5[4].date, nextDate);
  }

  return {
    current: curStreak, max: maxStreak,
    fivePlusCount: fivePlus.length,
    fivePlus: fivePlus.map(s=>({n:s.length, start:fmtDate(s[0].date), end5:fmtDate(s[4].date), endAll:fmtDate(s[s.length-1].date), opps:s.map(m=>m.opponent)})),
    daysSinceLast5,
    allStreaks2: streaks.filter(s=>s.length>=2).map(s=>({n:s.length,start:fmtDate(s[0].date),end:fmtDate(s[s.length-1].date),season:s[0].season}))
  };
}

function weekdayStats(matches, wdJS) {
  // wdJS: 0=일,1=월,...6=토
  const wd=matches.filter(m=>m.date.getDay()===wdJS);
  const wdNames=['일','월','화','수','목','금','토'];
  let curUnbeaten=0;
  for(let i=matches.length-1;i>=0;i--){
    if(matches[i].date.getDay()===wdJS){
      if(matches[i].result!=='L') curUnbeaten++;
      else break;
    }
  }
  const losses=wd.filter(m=>m.result==='L');
  const lastLoss=losses.length?losses[losses.length-1]:null;
  // 연속 무패 중 승/무 카운트
  let curUnbeatenW=0, curUnbeatenD=0;
  for(let i=matches.length-1;i>=0;i--){
    if(matches[i].date.getDay()===wdJS){
      if(matches[i].result==='W') curUnbeatenW++;
      else if(matches[i].result==='D') curUnbeatenD++;
      else break;
    }
  }
  return {
    name:wdNames[wdJS], total:wd.length,
    w:wd.filter(m=>m.result==='W').length,
    d:wd.filter(m=>m.result==='D').length,
    l:wd.filter(m=>m.result==='L').length,
    curUnbeaten, curUnbeatenW, curUnbeatenD,
    curW: curUnbeatenW,
    lastLoss: lastLoss?{date:fmtDate(lastLoss.date),opp:lastLoss.opponent,score:`${lastLoss.gf}-${lastLoss.ga}`}:null
  };
}

function scoringStreaks(matches) {
  let curScoring=0, curClean=0;
  for(let i=matches.length-1;i>=0;i--){ if(matches[i].gf>0) curScoring++; else break; }
  for(let i=matches.length-1;i>=0;i--){ if(matches[i].ga===0) curClean++; else break; }
  let maxS=0,maxC=0,ts=0,tc=0;
  for(const m of matches){
    ts=m.gf>0?ts+1:0; maxS=Math.max(maxS,ts);
    tc=m.ga===0?tc+1:0; maxC=Math.max(maxC,tc);
  }
  return {curScoring,curClean,maxScoring:maxS,maxClean:maxC};
}

function homeAwayStats(matches) {
  const home=matches.filter(m=>m.venue==='H');
  const away=matches.filter(m=>m.venue==='A');
  const curUnbeaten=(arr)=>{ let c=0; for(let i=arr.length-1;i>=0;i--){ if(arr[i].result!=='L') c++; else break; } return c; };
  const maxUnbeaten=(arr)=>{ let mx=0,c=0; for(const m of arr){ if(m.result!=='L') c++; else{ mx=Math.max(mx,c);c=0;} } return Math.max(mx,c); };
  return {
    homeCur:curUnbeaten(home), homeMax:maxUnbeaten(home),
    awayCur:curUnbeaten(away), awayMax:maxUnbeaten(away),
    homeW:home.filter(m=>m.result==='W').length, homeD:home.filter(m=>m.result==='D').length, homeL:home.filter(m=>m.result==='L').length,
    awayW:away.filter(m=>m.result==='W').length, awayD:away.filter(m=>m.result==='D').length, awayL:away.filter(m=>m.result==='L').length,
  };
}

function recentForm(matches, n=4) {
  const r=matches.slice(-n);
  return { n, w:r.filter(m=>m.result==='W').length, d:r.filter(m=>m.result==='D').length, l:r.filter(m=>m.result==='L').length,
    gf:r.reduce((s,m)=>s+m.gf,0), ga:r.reduce((s,m)=>s+m.ga,0), games:r };
}

function seasonCompare(matches) {
  const bySeason={};
  for(const m of matches){
    if(!m.isLeague) continue;
    if(!bySeason[m.season]) bySeason[m.season]=[];
    bySeason[m.season].push(m);
  }
  return Object.entries(bySeason).map(([s,ms])=>{
    const first8=ms.slice(0,8);
    return { season:+s, games:first8.length,
      w:first8.filter(m=>m.result==='W').length,
      d:first8.filter(m=>m.result==='D').length,
      l:first8.filter(m=>m.result==='L').length,
      gf:first8.reduce((s,m)=>s+m.gf,0),
      ga:first8.reduce((s,m)=>s+m.ga,0),
      pts:first8.filter(m=>m.result==='W').length*3+first8.filter(m=>m.result==='D').length
    };
  });
}

function biggestWins(matches,n=5) {
  return matches.filter(m=>m.result==='W').map(m=>({...m,diff:m.gf-m.ga}))
    .sort((a,b)=>b.diff-a.diff||b.gf-a.gf||(b.match_no>0?1:0)-(a.match_no>0?1:0)||b.date-a.date).slice(0,n);
}

function renderReport(opp, venue, nextDate, wdJS) {
  const matches = buildMatches();
  const leagueMatches = matches.filter(m => m.isLeague); // K리그 정규리그만
  const vs = vsRecord(matches, opp, venue, nextDate);     // vsRecord 내부에서 이미 isLeague 필터
  const streaks = winStreaks(leagueMatches, nextDate);
  const wd = weekdayStats(leagueMatches, wdJS);
  const scoring = scoringStreaks(leagueMatches);
  const ha = homeAwayStats(leagueMatches);
  const recent = recentForm(leagueMatches, 4);
  const seasons = seasonCompare(leagueMatches);
  const mgrData = managerRecord(matches);
  const curMgr = mgrData.current;
  const cr = mgrData.curRecord;
  const bigW = biggestWins(matches, 5);
  const curSeason = seasons.find(s=>s.season===2026);

  const wdName = wd.name + '요일';
  const venueKR = venue==='H'?'홈':'원정';
  const dateStr = nextDate ? fmtDate(nextDate) : '미정';

  // ── 홍보 소재: 3개 카테고리 ──
  const cat1 = []; // 구단 통산
  const cat2 = []; // 상대 관련
  const cat3 = []; // 특이 기록

  // CAT1: 구단 통산
  if(streaks.current >= 3) cat1.push(`현재 <strong>${streaks.current}연승</strong> 진행 중`);
  cat1.push(`김도균 감독 체제: <strong>${cr.w}승 ${cr.d}무 ${cr.l}패</strong> (${cr.games}경기)`);
  if(streaks.current>=4 && streaks.daysSinceLast5)
    cat1.push(`5연승 달성 시 — 구단 역대 <strong>${streaks.fivePlusCount+1}번째</strong> · 마지막 5연승 이후 <strong>${streaks.daysSinceLast5}일</strong>만`);
  cat1.push(`최근 4경기: <strong>${recent.gf}득점 ${recent.ga}실점</strong> (${recent.w}승 ${recent.d}무 ${recent.l}패)`);
  if(scoring.curScoring>3) cat1.push(`최근 <strong>${scoring.curScoring}경기 연속 득점</strong> 중`);
  if(scoring.curClean>1)   cat1.push(`최근 <strong>${scoring.curClean}경기 연속 무실점</strong>`);
  if(venue==='H' && ha.homeCur>2) cat1.push(`홈 <strong>${ha.homeCur}경기 연속 무패</strong> (역대 최다 ${ha.homeMax}경기)`);
  if(venue==='A' && ha.awayCur>2) cat1.push(`원정 <strong>${ha.awayCur}경기 연속 무패</strong> (역대 최다 ${ha.awayMax}경기)`);
  if(curSeason){
    const ranked=seasons.filter(s=>curSeason && s.games===curSeason.games).sort((a,b)=>b.pts-a.pts);
    const rank=ranked.findIndex(s=>s.season===2026)+1;
    cat1.push(`2026시즌 초반 8경기 <strong>${curSeason.pts}점</strong> — 역대 ${rank}위`);
  }

  // CAT2: 상대 관련
  if(vs.found){
    cat2.push(`통산 전적: <strong>${vs.w}승 ${vs.d}무 ${vs.l}패</strong> (${vs.gf}득점 ${vs.ga}실점)`);
    if(venue==='H') cat2.push(`홈 전적: <strong>${vs.homeW}승 ${vs.homeD}무 ${vs.homeL}패</strong> (${vs.homeGF}득 ${vs.homeGA}실)`);
    else            cat2.push(`원정 전적: <strong>${vs.awayW}승 ${vs.awayD}무 ${vs.awayL}패</strong>`);
    if(vs.lastWin)
      cat2.push(`마지막 승리: <strong>${vs.lastWin.date}</strong> · ${vs.lastWin.score} · ${vs.lastWin.venue}${vs.daysSinceLastWin?' · '+vs.daysSinceLastWin+'일 전':''}`);
    else cat2.push(`통산 승리 없음`);
    if(venue==='H'){
      if(vs.firstHomeWin) cat2.push(`홈 승리 이력 없음 → 승리 시 <strong>상대전 홈 첫 승 달성</strong>`);
      else if(vs.lastHWin) cat2.push(`마지막 홈 승리: <strong>${vs.lastHWin.date}</strong> · ${vs.lastHWin.score}`);
    }
    if(vs.curUnbeaten>1) cat2.push(`${opp} 상대 <strong>${vs.curUnbeaten}경기 연속 무패</strong> 진행 중`);
    if(+vs.avgGoals<1.5) cat2.push(`저득점 맞대결 — ${vs.total}경기 합산 <strong>${vs.totalGoals}골</strong> (평균 ${vs.avgGoals}골/경기)`);
  } else {
    cat2.push(`${opp} 전적 없음 — <strong>첫 맞대결</strong>`);
  }

  // CAT3: 특이 기록
  if(nextDate){
    if(wd.curUnbeaten >= 3) cat3.push(`${wdName}요일 <strong>${wd.curUnbeaten}경기 연속 무패</strong> 진행 중 (${wd.curUnbeatenW}승 ${wd.curUnbeatenD}무)`);
  }

  // 최근 N경기 무패
  let recentUnbeaten2=0;
  for(let ri=leagueMatches.length-1;ri>=0;ri--){
    if(leagueMatches[ri].result!=='L') recentUnbeaten2++;
    else break;
  }
  if(recentUnbeaten2>=5){

  // 홈/원정 무패

    for(let i=homeM2.length-1;i>=0;i--){ if(homeM2[i].result!=='L') homeCur2++; else break; }

  } else {
    const awayM2=leagueMatches.filter(m=>m.venue==='A');
    let awayCur2=0;
    for(let i=awayM2.length-1;i>=0;i--){ if(awayM2[i].result!=='L') awayCur2++; else break; }
    if(awayCur2>=3) cat3.push(`원정 <strong>${awayCur2}경기 연속 무패</strong>`);
  }

  // 최근 3경기 득실점
  const r3c=leagueMatches.slice(-3);
  const gf3c=r3c.reduce((s,m)=>s+m.gf,0);
  const ga3c=r3c.reduce((s,m)=>s+m.ga,0);

  if(ga3c<=1) cat3.push(`최근 3경기 <strong>${ga3c}실점</strong> — 수비 강세`);

  // 연속 득점/무실점
  // 연속 득점은 위에서 처리
  if(scoring.curClean>=3) cat3.push(`최근 <strong>${scoring.curClean}경기 연속 무실점</strong>`);

  // 연속 득점 (조건 없이 표시)
  if(scoring.curScoring>=1) cat3.push(`최근 <strong>${scoring.curScoring}경기 연속 득점</strong> 중`);

  // 월별 전적 (김도균 감독)
  if(nextDate){
    const nextMo2=nextDate.getMonth()+1;
    const moNm={2:'2월',3:'3월',4:'4월',5:'5월',6:'6월',7:'7월',8:'8월',9:'9월',10:'10월',11:'11월',12:'12월'};
    const moNm2=moNm[nextMo2]||'';

    const moH=moAll2.filter(m=>m.venue==='H');
    const moA=moAll2.filter(m=>m.venue==='A');

function buildManagerTableRows(mgrStats) {
  var sorted = mgrStats.slice().sort(function(a,b){
    if(a.isCurrent) return -1;
    if(b.isCurrent) return 1;
    // 최신 취임일 순
    return b.start > a.start ? 1 : -1;
  });
  return sorted.map(function(m) {
    var rowClass = m.isCurrent ? 'current-season' : '';
    var fw = m.isCurrent ? 700 : 400;
    return '<tr class="' + rowClass + '">'
      + '<td style="font-weight:' + fw + '">' + m.name + (m.isCurrent ? ' ▶' : '') + '</td>'
      + '<td style="color:var(--gray);font-size:.72rem">' + m.start.slice(0,7) + ' ~ ' + (m.isCurrent ? '현재' : m.end.slice(0,7)) + '</td>'
      + '<td>' + m.games + '</td>'
      + '<td style="color:var(--green)">' + m.r.w + '</td>'
      + '<td style="color:var(--draw)">' + m.r.d + '</td>'
      + '<td style="color:var(--red)">' + m.r.l + '</td>'
      + '<td><strong>' + m.pts + '</strong> <span style="color:var(--gray);font-size:.7rem">(' + m.winRate + '%)</span></td>'
      + '<td style="color:var(--gray2)">' + m.gamesAll + '</td>'
      + '<td style="color:var(--green);opacity:.7">' + m.ra.w + '</td>'
      + '<td style="color:var(--draw);opacity:.7">' + m.ra.d + '</td>'
      + '<td style="color:var(--red);opacity:.7">' + m.ra.l + '</td>'
      + '<td style="opacity:.7">' + m.ptsAll + '</td>'
      + '</tr>';
  }).join('');
}


function renderVsCard(vs, opp, venue) {
  if(!vs.found) {
    return '<div class="card" style="padding:40px;text-align:center;color:var(--gray)">첫 맞대결 — 데이터 없음</div>';
  }

  var tot = vs.total;
  var wPct = tot ? (vs.w/tot*100).toFixed(0) : 0;
  var dPct = tot ? (vs.d/tot*100).toFixed(0) : 0;
  var lPct = tot ? (vs.l/tot*100).toFixed(0) : 0;
  var venueLabel = venue==='H' ? '🏠 홈 전적' : '✈️ 원정 전적';
  var venueRecord = venue==='H'
    ? (vs.homeW + '승 ' + vs.homeD + '무 ' + vs.homeL + '패')
    : (vs.awayW + '승 ' + vs.awayD + '무 ' + vs.awayL + '패');
  var venueGoals = venue==='H' ? (vs.homeGF + '득점 ' + vs.homeGA + '실점') : '';

  // 마지막 승리
  var lastWinHtml = '';
  if(vs.lastWin) {
    lastWinHtml = '<div style="font-size:.9rem;font-weight:700;color:var(--gold2)">' + vs.lastWin.date + '</div>'
      + '<div style="font-size:.75rem;color:var(--white);margin-top:2px">' + vs.lastWin.score + ' · ' + vs.lastWin.venue + (vs.daysSinceLastWin?' · '+vs.daysSinceLastWin+'일 전':'') + '</div>';
  } else {
    lastWinHtml = '<div style="font-size:.85rem;color:var(--gray)">승리 없음</div>'
      + (venue==='H' ? '<div style="font-size:.72rem;color:var(--gold2);margin-top:4px">★ 승리 시 홈 첫 승 달성!</div>' : '');
  }

  // 연속 무패
  var unbeatenHtml = '';
  if(vs.curUnbeaten > 0) {
    unbeatenHtml = '<div style="padding:12px 24px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:rgba(46,204,113,.06);">'
      + '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:2rem;color:#2ecc71;line-height:1">' + vs.curUnbeaten + '</div>'
      + '<div><div style="font-size:.75rem;font-weight:700;color:#2ecc71">경기 연속 무패 진행 중</div>'
      + '<div style="font-size:.68rem;color:var(--gray)">vs ' + opp + '</div></div>'
      + '</div>';
  }

  // 시즌별 전적
  var seasonHtml = (vs.seasonStats||[]).map(function(s) {
    var stot = s.w+s.d+s.l;
    var swPct = stot ? s.w/stot : 0;
    var sdPct = stot ? s.d/stot : 0;
    var slPct = stot ? s.l/stot : 0;
    var isLatest = s.season === 2026;
    return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">'
      + '<span style="font-size:.72rem;color:' + (isLatest?'var(--gold2)':'var(--gray)') + ';width:36px;flex-shrink:0;font-weight:' + (isLatest?700:400) + '">' + s.season + '</span>'
      + '<div style="flex:1;height:6px;background:var(--navy3);border-radius:3px;overflow:hidden;display:flex;">'
      + '<div style="flex:' + swPct + ';background:#2ecc71;min-width:' + (s.w>0?'4px':'0') + '"></div>'
      + '<div style="flex:' + sdPct + ';background:#5e9bdc;min-width:' + (s.d>0?'2px':'0') + '"></div>'
      + '<div style="flex:' + slPct + ';background:#e74c3c;min-width:' + (s.l>0?'4px':'0') + '"></div>'
      + '</div>'
      + '<span style="font-size:.68rem;color:var(--gray);width:72px;flex-shrink:0;text-align:right">' + s.w + '승' + s.d + '무' + s.l + '패</span>'
      + '</div>';
  }).join('');

  return '<div class="card" style="padding:0;overflow:hidden;">'
    // 헤더
    + '<div style="background:linear-gradient(135deg,#0d1f3c 0%,#152a4a 100%);padding:18px 24px 14px;">'
    + '<div style="font-size:.62rem;letter-spacing:2px;color:var(--gray);text-transform:uppercase;margin-bottom:4px">HEAD TO HEAD</div>'
    + '<div style="font-size:1.15rem;font-weight:700;color:var(--white)">서울 이랜드 FC <span style="color:var(--gray);font-size:.85rem;font-weight:400"> vs </span>' + opp + '</div>'
    + '<div style="font-size:.68rem;color:var(--gray);margin-top:3px">K리그 정규리그 기준 · 총 ' + tot + '경기</div>'
    + '</div>'
    // 승무패 바
    + '<div style="display:flex;height:8px;">'
    + '<div style="flex:' + vs.w + ';background:#2ecc71"></div>'
    + '<div style="flex:' + vs.d + ';background:#5e9bdc"></div>'
    + '<div style="flex:' + vs.l + ';background:#e74c3c"></div>'
    + '</div>'
    + '<div style="display:flex;justify-content:space-between;padding:4px 24px 0;font-size:.65rem;">'
    + '<span style="color:#2ecc71">승 ' + wPct + '%</span>'
    + '<span style="color:#5e9bdc">무 ' + dPct + '%</span>'
    + '<span style="color:#e74c3c">패 ' + lPct + '%</span>'
    + '</div>'
    // 수치
    + '<div style="display:grid;grid-template-columns:repeat(6,1fr);padding:14px 24px;border-bottom:1px solid var(--border);">'
    + ['<span style="color:#2ecc71">'+vs.w+'</span>승', '<span style="color:#5e9bdc">'+vs.d+'</span>무', '<span style="color:#e74c3c">'+vs.l+'</span>패', '<span style="color:var(--gold2)">'+vs.gf+'</span>득', vs.ga+'실', vs.avgGoals+'골/경기'].map(function(v,i){
        return '<div style="text-align:center"><div style="font-family:\'Bebas Neue\',sans-serif;font-size:1.8rem;line-height:1">' + v + '</div></div>';
      }).join('')
    + '</div>'
    // 홈/원정 + 마지막 승리
    + '<div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);">'
    + '<div style="padding:12px 20px;border-right:1px solid var(--border);">'
    + '<div style="font-size:.62rem;color:var(--gray);margin-bottom:5px">' + venueLabel + '</div>'
    + '<div style="font-size:.95rem;font-weight:700;color:var(--white)">' + venueRecord + '</div>'
    + '<div style="font-size:.7rem;color:var(--gray);margin-top:1px">' + venueGoals + '</div>'
    + '</div>'
    + '<div style="padding:12px 20px;">'
    + '<div style="font-size:.62rem;color:var(--gray);margin-bottom:5px">🏆 마지막 승리</div>'
    + lastWinHtml
    + '</div>'
    + '</div>'
    // 연속 무패
    + unbeatenHtml
    // 시즌별
    + '<div style="padding:14px 24px;">'
    + '<div style="font-size:.62rem;letter-spacing:1px;color:var(--gray);margin-bottom:8px">시즌별 전적</div>'
    + seasonHtml
    + '</div>'
    + '</div>';
}

function renderAITab() {
  var container = document.getElementById('ai-container');
  if(!container) return;

  var oppEl = document.getElementById('inp-opponent');
  var opp = oppEl ? oppEl.value.trim() : '';
  if(!opp) {
    container.innerHTML = '<div class="card" style="text-align:center;padding:40px;"><div style="color:var(--gray);font-size:.9rem;">경기를 먼저 선택하고 분석 실행 후 이 탭을 열어주세요.</div></div>';
    return;
  }

  // 데이터 수집
  var matches = buildMatches();
  var leagueM = matches.filter(function(m){ return m.isLeague; });
  var vs = vsRecord(matches, opp, '', null);
  var streaks = winStreaks(leagueM, null);
  var recent = recentForm(leagueM, 5);
  var scoring = scoringStreaks(leagueM);
  var mgrData = managerRecord(matches);
  var cr = mgrData.curRecord;

  var matchIdx = document.getElementById('inp-match') ? document.getElementById('inp-match').value : '';
  var nextVenue = 'H', nextDate = null;
  if(matchIdx !== '') { var sch = SCHEDULE[+matchIdx]; nextVenue = sch[3]; nextDate = parseDate(sch[2]); }

  // 2026 홈 성적
  var home2026 = leagueM.filter(function(m){ return m.season===2026 && m.venue==='H'; });
  var hw=home2026.filter(function(m){return m.result==='W';}).length;
  var hd=home2026.filter(function(m){return m.result==='D';}).length;
  var hl_=home2026.filter(function(m){return m.result==='L';}).length;

  // ── 규칙별 소재 발굴 ────────────────────────────────────────
  var items = []; // {rule, label, text, score}

  function add(rule, label, text, score) {
    items.push({rule:rule, label:label, text:text, score:score||0});
  }

  // 규칙 1: 연승
  if(streaks.current >= 3) {
    var nextN = streaks.current + 1;
    add(1, '연승', '현재 ' + streaks.current + '연승 진행 중 → ' + nextN + '연승 도전', streaks.current >= 4 ? 5 : streaks.current >= 3 ? 4 : 3);
    if(streaks.current >= 4) {
      add(1, '연승 표현', '"상승가도", "파죽지세" 표현 활용 가능', 4);
    }
    if(streaks.fivePlusCount !== undefined && streaks.current === 4) {
      add(1, '역대 기록', '5연승 달성 시 구단 역대 ' + (streaks.fivePlusCount+1) + '번째', 5);
    }
  }

  // 규칙 2: 무패 기록
  // 요일 무패
  var wdNamesAll = ['일','월','화','수','목','금','토'];
  var bestWd = null, bestWdName = '';
  for(var di=0; di<7; di++) {
    var tmp = weekdayStats(leagueM, di);
    if(!bestWd || tmp.curUnbeaten > bestWd.curUnbeaten) { bestWd = tmp; bestWdName = wdNamesAll[di]; }
  }
  // 다음 경기 요일의 무패만 표시
  var nextWdJS = nextDate ? nextDate.getDay() : -1;
  var nextWdStat = nextDate ? weekdayStats(leagueM, nextWdJS) : null;
  var nextWdName = nextDate ? wdNamesAll[nextWdJS] : '';
  if(nextWdStat && nextWdStat.curUnbeaten >= 3) {
    add(2, nextWdName+'요일 무패', nextWdName+'요일 ' + nextWdStat.curUnbeaten + '경기 연속 무패 (' + nextWdStat.curUnbeatenW + '승 ' + nextWdStat.curUnbeatenD + '무)', nextWdStat.curUnbeaten >= 10 ? 5 : nextWdStat.curUnbeaten >= 5 ? 4 : 3);
  }

  // 최근 N경기 무패
  var recentUnbeaten = 0;
  for(var ri=leagueM.length-1; ri>=0; ri--) {
    if(leagueM[ri].result !== 'L') recentUnbeaten++;
    else break;
  }
  if(recentUnbeaten >= 5) {
    var ruW = leagueM.slice(-recentUnbeaten).filter(function(m){return m.result==='W';}).length;
    var ruD = recentUnbeaten - ruW;
    add(2, '최근 무패', '최근 ' + recentUnbeaten + '경기 무패 (' + ruW + '승 ' + ruD + '무)', recentUnbeaten >= 10 ? 5 : 4);
  }

  // 홈/원정 무패
  if(nextVenue === 'H') {
    var homeM = leagueM.filter(function(m){return m.venue==='H';});
    var homeCur = 0;
    for(var hi=homeM.length-1; hi>=0; hi--) {
      if(homeM[hi].result !== 'L') homeCur++;
      else break;
    }
    if(homeCur >= 3) {
      add(2, '홈 무패', '홈 ' + homeCur + '경기 연속 무패', homeCur >= 8 ? 5 : 4);
    }
  }

  // 규칙 3: 최근 N경기 득실점
  var r3 = recent.games.slice(-3);
  var gf3 = r3.reduce(function(s,m){return s+m.gf;},0);
  var ga3 = r3.reduce(function(s,m){return s+m.ga;},0);
  if(gf3 >= 9) add(3, '득점 폭발', '최근 3경기 ' + gf3 + '득점 ' + ga3 + '실점', 5);
  else if(gf3 >= 7) add(3, '득점 강세', '최근 3경기 ' + gf3 + '득점 ' + ga3 + '실점', 4);
  if(ga3 <= 1) add(3, '수비 강세', '최근 3경기 ' + ga3 + '실점', 4);

  var r5gf = recent.gf, r5ga = recent.ga;
  if(r5gf >= 12) add(3, '최근 5경기 득점', '최근 5경기 ' + r5gf + '득점 ' + r5ga + '실점', 4);
  if(scoring.curScoring >= 5) add(3, '연속 득점', scoring.curScoring + '경기 연속 득점', scoring.curScoring >= 10 ? 5 : 4);
  if(scoring.curClean >= 3) add(3, '연속 무실점', scoring.curClean + '경기 연속 무실점', 4);

  // 규칙 4: 상대 전적
  if(vs.found) {
    // 통산 전적
    if(vs.w > vs.l * 2) add(4, '통산 우세', '통산 ' + vs.w + '승 ' + vs.d + '무 ' + vs.l + '패 — 압도적 우세', 4);
    else if(vs.w > vs.l) add(4, '통산 전적', '통산 ' + vs.w + '승 ' + vs.d + '무 ' + vs.l + '패', 3);

    // 홈/원정 분리
    if(nextVenue === 'H' && vs.homeW > vs.homeL) {
      add(4, '홈 전적', '홈 전적 ' + vs.homeW + '승 ' + vs.homeD + '무 ' + vs.homeL + '패', 3);
    }
    if(nextVenue === 'A' && vs.awayW > 0) {
      add(4, '원정 전적', '원정 ' + vs.awayW + '승 기록 중', 3);
    }

    // 연속 무패
    if(vs.curUnbeaten >= 3) add(4, '상대 연속 무패', opp + ' 상대 ' + vs.curUnbeaten + '경기 연속 무패', vs.curUnbeaten >= 5 ? 5 : 4);

    // 첫 홈 승리
    if(nextVenue === 'H' && vs.firstHomeWin) add(4, '홈 첫 승 도전', opp + ' 상대 홈 첫 승 도전', 4);

    // 최근 시즌 전적
    if(vs.seasonStats && vs.seasonStats.length > 0) {
      var recentSzn = vs.seasonStats[0];
      if(recentSzn.w > recentSzn.l) {
        add(4, '최근 시즌', recentSzn.season + '시즌 ' + recentSzn.w + '승 ' + recentSzn.d + '무 ' + recentSzn.l + '패', 3);
      }
    }
  } else {
    add(4, '첫 맞대결', opp + ' 상대 역사적 첫 맞대결', 4);
  }

  // 규칙 5: 2026 홈 성적
  if(nextVenue === 'H' && home2026.length > 0) {
    add(5, '2026 홈 성적', '2026시즌 홈 ' + hw + '승 ' + hd + '무 ' + hl_ + '패 (' + home2026.length + '경기)', hw > hl_ ? 3 : 2);
  }

  // 규칙 7: 월별 전적 (김도균 감독 리그+PO)
  if(nextDate) {
    var nextMonth = nextDate.getMonth() + 1; // 1~12
    var moNames = {2:'2월',3:'3월',4:'4월',5:'5월',6:'6월',7:'7월',8:'8월',9:'9월',10:'10월',11:'11월',12:'12월'};
    var moName = moNames[nextMonth] || (nextMonth + '월');

    // 김도균 감독 전체 리그 경기에서 해당 월 추출
    var kimMatches = matches.filter(function(m){ return m.season >= 2024 && m.match_no !== 0; });
    var moAll = kimMatches.filter(function(m){ return m.date.getMonth()+1 === nextMonth; });
    var moHome = moAll.filter(function(m){ return m.venue === 'H'; });
    var moAway = moAll.filter(function(m){ return m.venue === 'A'; });
    var moVenue = nextVenue === 'H' ? moHome : moAway;

    if(moAll.length >= 3) {
      var mow = moAll.filter(function(m){return m.result==='W';}).length;
      var mod_ = moAll.filter(function(m){return m.result==='D';}).length;
      var mol = moAll.filter(function(m){return m.result==='L';}).length;
      var moWr = (mow/moAll.length*100).toFixed(0);
      var moGF = moAll.reduce(function(s,m){return s+m.gf;},0);
      var moGA = moAll.reduce(function(s,m){return s+m.ga;},0);
      var moPPG = ((mow*3+mod_)/moAll.length).toFixed(2);

      // 전체 월 평균과 비교
      var totalPPG = (cr.w*3+cr.d) / cr.games;
      var isStrong = +moPPG > totalPPG;
      var score = isStrong ? 4 : 2;

      add(7, moName + ' 전적 (김도균)', moName + ' ' + moAll.length + '경기 ' + mow + '승' + mod_ + '무' + mol + '패 승률' + moWr + '% / 평균 ' + (moGF/moAll.length).toFixed(1) + '득 ' + (moGA/moAll.length).toFixed(1) + '실', score);

      // 홈/원정 분리 (3경기 이상)
      if(moVenue.length >= 3) {
        var vw = moVenue.filter(function(m){return m.result==='W';}).length;
        var vd = moVenue.filter(function(m){return m.result==='D';}).length;
        var vl = moVenue.filter(function(m){return m.result==='L';}).length;
        var vWr = (vw/moVenue.length*100).toFixed(0);
        var vLabel = nextVenue === 'H' ? '홈' : '원정';
        var vScore = vWr >= 80 ? 5 : vWr >= 60 ? 4 : 3;
        add(7, moName + ' ' + vLabel + ' 전적', moName + ' ' + vLabel + ' ' + moVenue.length + '경기 ' + vw + '승' + vd + '무' + vl + '패 승률' + vWr + '%', vScore);
      }

      // 득점율 특이사항
      var moScored = moAll.filter(function(m){return m.gf>0;}).length;
      var moScoredRate = (moScored/moAll.length*100).toFixed(0);
      if(+moScoredRate >= 90) {
        add(7, moName + ' 득점율', moName + ' ' + moAll.length + '경기 중 ' + moScored + '경기 득점 (득점율 ' + moScoredRate + '%)', 4);
      }
    }
  }

  // 규칙 6: 감독 체제
  add(6, '김도균 감독', '김도균 감독 체제 K리그 ' + cr.w + '승 ' + cr.d + '무 ' + cr.l + '패 (' + cr.games + '경기)', 3);

  // score 기준 정렬
  items.sort(function(a,b){ return b.score - a.score; });

  var star = items.filter(function(i){ return i.score >= 4; }).slice(0,5);
  var extra = items.filter(function(i){ return i.score < 4; }).slice(0,5);

  // ── 렌더링 ───────────────────────────────────────────────────
  function row(item, isStar) {
    return '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">'
      + '<div style="flex:1">'
      + '<div style="font-size:.7rem;color:var(--gray);margin-bottom:2px">' + item.label + '</div>'
      + '<div style="font-size:.85rem;color:var(--white)">' + (isStar ? '<span style="color:var(--gold2)">★ </span>' : '') + item.text + '</div>'
      + '</div>'
      + '</div>';
  }

  var html = '<div class="card">'
    + '<div class="card-title">✨ AI 홍보 소재 분석 <span style="font-size:.65rem;color:var(--gray);font-weight:400">vs ' + opp + ' · 규칙 기반 자동 분석</span></div>'

    + '<div style="margin-bottom:20px;">'
    + '<div style="font-size:.68rem;letter-spacing:1.5px;color:var(--gold);font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--gold-dim)">★ 핵심 홍보 소재 (최대 5개)</div>'
    + (star.length ? star.map(function(i){return row(i,true);}).join('') : '<div style="color:var(--gray);font-size:.8rem;padding:8px 0">해당 소재 없음</div>')
    + '</div>'

    + '<div style="margin-bottom:20px;">'
    + '<div style="font-size:.68rem;letter-spacing:1.5px;color:var(--gray);font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">추가 활용 소재</div>'
    + (extra.length ? extra.map(function(i){return row(i,false);}).join('') : '<div style="color:var(--gray);font-size:.8rem;padding:8px 0">해당 소재 없음</div>')
    + '</div>'


    + '</div>';

  container.innerHTML = html;
}

    + '<option value="">전체 대회</option><option value="K리그">K리그</option><option value="FA컵">FA컵</option><option value="PO">플레이오프</option>'
    + '</select>'
    + '<select id="hist-result" style="background:var(--navy3);border:1px solid var(--border);color:var(--white);padding:6px 10px;border-radius:6px;font-size:.78rem;">'
    + '<option value="">전체 결과</option><option value="W">승</option><option value="D">무</option><option value="L">패</option>'
    + '</select>'
    + '<select id="hist-venue" style="background:var(--navy3);border:1px solid var(--border);color:var(--white);padding:6px 10px;border-radius:6px;font-size:.78rem;">'
    + '<option value="">홈/원정</option><option value="H">홈</option><option value="A">원정</option>'
    + '</select>'
    + '<span id="hist-count" style="color:var(--gray);font-size:.75rem;margin-left:4px"></span>'
    + '</div>';

  // 테이블 헤더
  var tableHtml = '<div style="overflow-x:auto;"><table class="season-table" id="hist-table">'
    + '<thead><tr>'

    + '<th style="width:45px">H/A</th>'
    + '<th style="width:55px">스코어</th>'
    + '<th style="width:35px">결과</th>'
    + '<th>특이사항</th>'
    + '</tr></thead>'
    + '<tbody id="hist-tbody"></tbody>'
    + '</table></div>';

  container.innerHTML = '<div class="card">'
    + '<div class="card-title">역대 경기 기록 <span style="color:var(--gray);font-size:.72rem;font-weight:400">총 436경기</span></div>'
    + filterHtml + tableHtml + '</div>';

  function buildRows(data) {
    var tbody = document.getElementById('hist-tbody');
    var count = document.getElementById('hist-count');
    tbody.innerHTML = '';
    count.textContent = data.length + '경기';
    data.forEach(function(m) {
      var no=m[0], season=m[1], league=m[2], date=m[3], venue=m[4], opp=m[5], res=m[6], gf=m[7], ga=m[8], note=m[9];
      var resColor = res==='W'?'var(--green)':res==='D'?'var(--draw)':'var(--red)';
      var resLabel = res==='W'?'승':res==='D'?'무':'패';
      var venueLabel = venue==='H'?'<span style="color:var(--gold2)">홈</span>':'<span style="color:var(--gray)">원정</span>';
      var leagueColor = league==='K리그'?'var(--blue)':league==='FA컵'?'var(--green)':'var(--gold)';
      var noteHtml = note ? '<span style="color:var(--gold2);font-size:.68rem;font-weight:700">★ '+note.replace(/\|/g,' · ')+'</span>' : '';
      var tr = document.createElement('tr');
      if(note) tr.style.background = 'rgba(212,175,55,0.06)';
      tr.innerHTML = '<td style="color:var(--gray);font-size:.72rem">'+no+'</td>'
        + '<td><span style="font-size:.65rem;color:'+leagueColor+';border:1px solid '+leagueColor+'33;padding:1px 4px;border-radius:3px">'+league+'</span></td>'

        + '<td>'+noteHtml+'</td>';

    });
  }

  buildRows(MATCH_HISTORY);

  function applyFilter() {
    var search = document.getElementById('hist-search').value.toLowerCase();
    var league = document.getElementById('hist-league').value;
    var result = document.getElementById('hist-result').value;
    var venue  = document.getElementById('hist-venue').value;
    var filtered = MATCH_HISTORY.filter(function(m) {
      return (!search || m[5] === search)
        && (!league || m[2] === league)
        && (!result || m[6] === result)
        && (!venue  || m[4] === venue);
    });
    buildRows(filtered);
  }

  ['hist-search','hist-league','hist-result','hist-venue'].forEach(function(id) {
    var el = document.getElementById(id);
    el.addEventListener('input', applyFilter);
    el.addEventListener('change', applyFilter);
  });
}

window.addEventListener('load', () => {
  populateSchedule();
  const $ = id => document.getElementById(id);
  $('btn-run-report') && $('btn-run-report').addEventListener('click', runReport);
  $('inp-match')      && $('inp-match').addEventListener('change', onMatchSelect);
});

// ─── 요일 변환 (select value는 0=월~6=일, JS Date는 0=일~6=토) ─
function selectToJSWeekday(v) {
  // select: 0=월,1=화,2=수,3=목,4=금,5=토,6=일
  // JS:     0=일,1=월,2=화,3=수,4=목,5=금,6=토
  return [1,2,3,4,5,6,0][+v];
}

function runReport() {
  const opp = document.getElementById('inp-opponent').value.trim();
  if(!opp){ alert('상대팀을 입력해주세요'); return; }

  // 일정에서 자동 추출
  const matchIdx = document.getElementById('inp-match').value;
  let venue = 'H', nextDate = null, wdJS = 0;
  if(matchIdx !== '') {
    const s = SCHEDULE[+matchIdx];
    venue = s[3];
    nextDate = parseDate(s[2]);
    wdJS = nextDate.getDay(); // JS: 0=일
  }
  renderReport(opp, venue, nextDate, wdJS);
}
